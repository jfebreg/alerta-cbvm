<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#8B0000" />
  <title>Alerta CBVM</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a1a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .titulo {
      font-size: 22px;
      font-weight: bold;
      color: #FFD700;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .subtitulo {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 50px;
      letter-spacing: 1px;
    }

    .btn-evacuar {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ff4444, #8B0000);
      border: 6px solid #ff6666;
      box-shadow: 0 0 40px rgba(255, 50, 50, 0.6), 0 0 80px rgba(255, 50, 50, 0.3);
      color: white;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .btn-evacuar:active {
      transform: scale(0.94);
      box-shadow: 0 0 20px rgba(255, 50, 50, 0.4);
    }

    .btn-evacuar .icono { font-size: 40px; }
    .btn-evacuar .texto { font-size: 18px; letter-spacing: 4px; }

    /* MODAL DE CONFIRMACIÓN */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 10;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 30px;
    }

    .overlay.visible { display: flex; }

    .modal {
      background: #222;
      border: 2px solid #ff4444;
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    .modal .alerta-icon { font-size: 56px; margin-bottom: 16px; }
    .modal h2 { font-size: 20px; color: #FFD700; margin-bottom: 12px; }
    .modal p { font-size: 15px; color: #ccc; margin-bottom: 28px; line-height: 1.5; }

    .modal-btns { display: flex; gap: 12px; }

    .btn-confirmar {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #cc0000;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-cancelar {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      border: 2px solid #555;
      background: transparent;
      color: #aaa;
      font-size: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ESTADO ENVIANDO */
    .estado {
      margin-top: 40px;
      font-size: 15px;
      color: #aaa;
      min-height: 24px;
      text-align: center;
    }

    .estado.ok { color: #44ff88; }
    .estado.error { color: #ff6666; }

    /* SPINNER */
    .spinner {
      display: none;
      width: 36px;
      height: 36px;
      border: 4px solid #555;
      border-top-color: #ff4444;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 0;
    }
    .spinner.visible { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hora {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="logo">🚒</div>
  <div class="titulo">CBVM</div>
  <div class="subtitulo">SISTEMA DE ALERTA</div>

  <button class="btn-evacuar" onclick="mostrarConfirmacion()">
    <span class="icono">🚨</span>
    <span class="texto">EVACUAR</span>
  </button>

  <div class="spinner" id="spinner"></div>
  <div class="estado" id="estado"></div>
  <div class="hora" id="hora"></div>

  <!-- Modal de confirmación -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="alerta-icon">⚠️</div>
      <h2>¿CONFIRMAR ALERTA?</h2>
      <p>Se enviará SMS de evacuación a todos los contactos registrados.</p>
      <div class="modal-btns">
        <button class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        <button class="btn-confirmar" onclick="enviarAlerta()">ACTIVAR</button>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ REEMPLAZA ESTA URL CON LA DE TU WEBHOOK EN n8n
    const WEBHOOK_URL = "https://jfebreg.app.n8n.cloud/webhook/alerta-evacuacion";

    function mostrarConfirmacion() {
      document.getElementById("overlay").classList.add("visible");
    }

    function cerrarModal() {
      document.getElementById("overlay").classList.remove("visible");
    }

    async function enviarAlerta() {
      cerrarModal();

      const spinner = document.getElementById("spinner");
      const estado = document.getElementById("estado");
      const hora = document.getElementById("hora");

      spinner.classList.add("visible");
      estado.textContent = "Enviando alerta...";
      estado.className = "estado";
      hora.textContent = "";

      try {
        const resp = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            tipo: "evacuacion",
            origen: "app-cbvm",
            timestamp: new Date().toISOString()
          })
        });

        spinner.classList.remove("visible");

        if (resp.ok) {
          estado.textContent = "✅ Alerta enviada correctamente";
          estado.className = "estado ok";
          hora.textContent = "Enviado: " + new Date().toLocaleTimeString("es-CL");
          navigator.vibrate && navigator.vibrate([200, 100, 200]);
        } else {
          estado.textContent = "⚠️ Error del servidor (" + resp.status + ")";
          estado.className = "estado error";
        }

      } catch (err) {
        spinner.classList.remove("visible");
        estado.textContent = "❌ Sin conexión. Reintenta.";
        estado.className = "estado error";
      }
    }
  </script>

</body>
</html>
